  const [tf, setTf] = useState("all");

  const nMap = useMemo(()=>{ const m={}; companies.forEach(c=>m[c.id]=c.name); return m; },[]);

  const toggle = id => setSel(p => { const n=new Set(p); n.has(id)?n.delete(id):n.add(id); return n; });
  const filtered = releases.filter(r => sel.has(r.company) && (tf==="all"||r.type===tf));

  },[]);

  const maxT = Math.max(...totals,1);
  const groups = useMemo(()=>{const g={};filtered.forEach(r=>{if(!g[r.date])g[r.date]=[];g[r.date].push(r);});return Object.entries(g).sort(([a],[b])=>a.localeCompare(b));},[filtered]);

            <p style={{margin:"0 0 6px"}}><strong style={{color:"#7eb8ff"}}>2021–2022（萌芽期）：</strong>半年 1–3 版。OpenAI 探索 DALL·E/Whisper，Google 发布 PaLM/Imagen，智谱开源 GLM-130B。</p>

            <p style={{margin:0}}><strong style={{color:"#f472b6"}}>2026 Q1-Q2（指数加速 🔥）：</strong>仅 4 个月 20+ 重大发布。GPT-5.4→5.5 仅隔 6 周。</p>
          </div>

                <div style={{fontSize:10,color:"#4a5a78",fontWeight:500}}>{y===2021?"萌芽期":y===2022?"萌芽期":y===2023?"爆发元年":y===2024?"多模态元年":y===2025?"军备竞赛":y===2026?"指数加速":""}</div>
              </div>}
              <div style={{display:"flex",alignItems:"flex-start",marginBottom:1}}>
                <div style={{width:60,textAlign:"right",paddingRight:14,paddingTop:5,fontSize:10,color:"#5a6a88",fontWeight:500,flexShrink:0}}>{months[m-1]}</div>
                <div style={{width:8,height:8,borderRadius:"50%",background:"#3a5a8a",border:"2px solid #0a0e17",marginTop:7,marginRight:11,flexShrink:0,zIndex:1}}/>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,paddingBottom:4,flex:1}}>
                  {items.map((r,ri)=>{const h=hov===`${date}-${ri}`;const tC=typeColors[r.type]||"#94a3b8";return <div key={ri} onMouseEnter={()=>setHov(`${date}-${ri}`)} onMouseLeave={()=>setHov(null)} style={{padding:"5px 9px",background:h?cMap[r.company]+"20":r.hl?"#1a1f35":"#111827",border:`1px solid ${h?cMap[r.company]+"60":r.hl?"#3a4f7a":"#1e2a42"}`,borderRadius:7,borderLeft:`3px solid ${cMap[r.company]}`,cursor:"default",transition:"all 0.15s",maxWidth:290,transform:h?"translateY(-1px)":"none",boxShadow:r.hl?`0 0 10px ${cMap[r.company]}12`:"none"}}><div style={{fontSize:9,color:cMap[r.company],fontWeight:600,marginBottom:1,display:"flex",alignItems:"center",gap:4}}>{nMap[r.company]}<span style={{fontSize:8,padding:"0.5px 4px",borderRadius:3,background:tC+"18",color:tC,fontWeight:700}}>{r.type}</span>{r.hl&&<span style={{fontSize:7,padding:"0.5px 3px",borderRadius:3,background:"#fbbf2420",color:"#fbbf24",fontWeight:700}}>NEW</span>}</div><div style={{fontSize:11,fontWeight:600,color:"#d0daf0"}}>{r.name}</div></div>;})}
                </div>
              </div>
            </div>;
          })}
        </div>}

        <div style={{marginTop:24,padding:"10px 14px",background:"#111827",borderRadius:8,border:"1px solid #1e2a42"}}>
          <div style={{fontSize:10,color:"#7a8ba8",fontWeight:600,marginBottom:5}}>模型类型</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:7}}>{Object.entries(typeColors).map(([t,c])=><div key={t} style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:8,height:8,borderRadius:2,background:c+"30",border:`1px solid ${c}50`,display:"inline-block"}}/><span style={{fontSize:9.5,color:c}}>{t}</span></div>)}</div>
        </div>
        <div style={{marginTop:14,paddingTop:10,borderTop:"1px solid #1e2a42",fontSize:9,color:"#3a4f6a",textAlign:"center"}}>数据截至 2026年4月24日 · 10家公司 · 来源：各公司官方公告及公开报道</div>
      </div>
    </div>
  );
}

ReactDOM.render(<AITimeline />, document.getElementById('root'));
</script>
</body>
</html>
